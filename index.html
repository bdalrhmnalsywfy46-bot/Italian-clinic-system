    <script>
        const video = document.getElementById('bgVideo');

        let stats = { waiting: 0, unconfirmed: 0, confirmed: 0, canceled: 0, lost: 0 };
        let patientDataMap = {}; 
        let archivePatientsMap = {}; 
        let labDataList = []; 
        let financeTransactions = []; 

        let longPressTimer;
        const longPressDuration = 1000; 

        function loadSavedData() {
            const savedStats = localStorage.getItem('italian_clinic_stats');
            const savedPatients = localStorage.getItem('italian_clinic_patients');
            const savedArchive = localStorage.getItem('italian_clinic_archive');
            const savedLab = localStorage.getItem('italian_clinic_lab');
            const savedFinance = localStorage.getItem('italian_clinic_finance');
            const savedLoginStatus = localStorage.getItem('italian_clinic_logged_in');

            if (savedStats) stats = JSON.parse(savedStats);
            if (savedPatients) patientDataMap = JSON.parse(savedPatients);
            if (savedArchive) archivePatientsMap = JSON.parse(savedArchive);
            if (savedLab) labDataList = JSON.parse(savedLab);
            if (savedFinance) financeTransactions = JSON.parse(savedFinance);

            if (savedLoginStatus === 'true') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                if(video) video.pause();
                checkLabDeadlines(); 
            }

            updateStatsDOM();
            rebuildCurrentVisitsTables();
            rebuildLabTable();
            rebuildFinanceDOM();
        }

        function checkLabDeadlines() {
            const todayStr = new Date().toISOString().split('T')[0]; 
            let alertsMessage = "";

            labDataList.forEach(item => {
                if (item.status !== 'done' && item.rawDeliveryDate <= todayStr) {
                    alertsMessage += `⚠️ الحالة: ${item.patientName} - شغل: ${item.workType} (تاريخ استلامها: ${item.deliveryDate})\n`;
                }
            });

            if (alertsMessage !== "") {
                setTimeout(() => {
                    alert(`🚨 تنبيه حالات المعمل المطلوبة اليوم:\n\n${alertsMessage}\nيرجى مراجعة المعمل واستلام الشغل المتبقي!`);
                }, 800);
            }
        }

        function saveDataToStorage() {
            localStorage.setItem('italian_clinic_stats', JSON.stringify(stats));
            localStorage.setItem('italian_clinic_patients', JSON.stringify(patientDataMap));
            localStorage.setItem('italian_clinic_archive', JSON.stringify(archivePatientsMap));
            localStorage.setItem('italian_clinic_lab', JSON.stringify(labDataList));
            localStorage.setItem('italian_clinic_finance', JSON.stringify(financeTransactions));
        }

        function toggleMute(event) {
            if(!video) return;
            video.muted = !video.muted;
            event.target.innerText = video.muted ? "🔇 تشغيل الصوت" : "🔊 كتم الصوت";
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('show');
        }

        function verifyAdminAccess() {
            const entry = prompt("🔒 يرجى إدخال كلمة مرور الإدارة والماليات للدخول:");
            if (entry === "$$ OMAR ELSIOFY") {
                switchPage('admin');
            } else if (entry !== null) {
                alert("❌ كلمة المرور غير صحيحة! الدخول مرفوض.");
            }
        }

        function switchPage(pageName) {
            document.querySelectorAll('.page-section').forEach(sec => sec.classList.remove('active-page'));
            document.querySelectorAll('.sidebar-menu li').forEach(li => li.classList.remove('active'));

            if (pageName === 'home') {
                document.getElementById('page-home').classList.add('active-page');
                document.getElementById('menu-home').classList.add('active');
                document.getElementById('pageMainTitle').innerText = "المركز الإيطالي للأسنان - الرئيسية";
            } else if (pageName === 'add') {
                document.getElementById('page-add').classList.add('active-page');
                document.getElementById('menu-add').classList.add('active');
                document.getElementById('pageMainTitle').innerText = "المركز الإيطالي للأسنان - إضافة موعد";
            } else if (pageName === 'history') {
                document.getElementById('page-history').classList.add('active-page');
                document.getElementById('menu-history').classList.add('active');
                document.getElementById('pageMainTitle').innerText = "المركز الإيطالي للأسنان - سجل الأرشيف التاريخي";
                renderHistoryDOM(); 
            } else if (pageName === 'lab') {
                document.getElementById('page-lab').classList.add('active-page');
                document.getElementById('menu-lab').classList.add('active');
                document.getElementById('pageMainTitle').innerText = "المركز الإيطالي للأسنان - المعامل والتركيبات";
                rebuildLabTable();
            } else if (pageName === 'admin') {
                document.getElementById('page-admin').classList.add('active-page');
                document.getElementById('menu-admin').classList.add('active');
                document.getElementById('pageMainTitle').innerText = "المركز الإيطالي للأسنان - الإدارة والماليات العامة";
                rebuildFinanceDOM();
            }
            toggleSidebar();
        }

        function updateStatsDOM() {
            document.getElementById('count-waiting').innerText = stats.waiting;
            document.getElementById('count-unconfirmed').innerText = stats.unconfirmed;
            document.getElementById('count-confirmed').innerText = stats.confirmed;
            document.getElementById('count-canceled').innerText = stats.canceled;
            document.getElementById('count-lost').innerText = stats.lost;
        }

        function toggleDropdown(e, rowId) {
            e.stopPropagation();
            document.querySelectorAll('.status-dropdown, .lab-dropdown').forEach(menu => {
                if (menu.id !== `drop_${rowId}` && menu.id !== `labDrop_${rowId}`) menu.classList.remove('show-menu');
            });

            const targetMenu = document.getElementById(`drop_${rowId}`) || document.getElementById(`labDrop_${rowId}`);
            if (targetMenu) {
                targetMenu.classList.toggle('show-menu');
                const rect = e.target.getBoundingClientRect();
                const containerRect = e.target.closest('.table-container').getBoundingClientRect();
                
                targetMenu.style.top = (rect.bottom - containerRect.top + 5) + 'px';
                targetMenu.style.right = (containerRect.right - rect.right) + 'px';
            }
        }

        document.addEventListener('click', function() {
            document.querySelectorAll('.status-dropdown, .lab-dropdown').forEach(menu => menu.classList.remove('show-menu'));
        });

        function changePatientStatus(rowId, newStatus) {
            const patient = patientDataMap[rowId];
            if (!patient) return;

            const oldStatus = patient.status;
            if (oldStatus && stats[oldStatus] > 0) stats[oldStatus]--;
            stats[newStatus]++;
            patient.status = newStatus;
            updateStatsDOM();

            pushToArchive(patient);
            saveDataToStorage(); 
            rebuildCurrentVisitsTables();
        }

        function handleLongPressStart(rowId) {
            longPressTimer = setTimeout(function() {
                const patient = patientDataMap[rowId];
                if (!patient) return;

                const action = confirm(`خيارات المريض: ${patient.name}\n\nاضغط OK لتعديل البيانات، أو Cancel لحذف الزيارة نهائياً.`);
                
                if (action) {
                    const newTimeInput = prompt(`1) الوقت الجديد:`, patient.time);
                    if (newTimeInput === null) return;

                    const newClinicInput = prompt(`2) العيادة الجديدة:`, patient.clinic || '');
                    if (newClinicInput === null) return;

                    const newDoctorInput = prompt(`3) الطبيب الجديد:`, patient.doctor || '');
                    if (newDoctorInput === null) return;

                    if (newTimeInput.trim() !== "") patient.time = newTimeInput.trim();
                    if (newClinicInput.trim() !== "") patient.clinic = newClinicInput.trim();
                    if (newDoctorInput.trim() !== "") patient.doctor = newDoctorInput.trim();
                    
                    const uniqueKey = patient.code.trim();
                    if (archivePatientsMap[uniqueKey] && archivePatientsMap[uniqueKey].visits[rowId]) {
                        archivePatientsMap[uniqueKey].visits[rowId].time = patient.time;
                        archivePatientsMap[uniqueKey].visits[rowId].clinic = patient.clinic;
                        archivePatientsMap[uniqueKey].visits[rowId].doctor = patient.doctor;
                    }
                    alert("تم تحديث البيانات بنجاج!");
                } else {
                    const deleteConfirm = confirm("هل أنت متأكد من حذف هذه الزيارة نهائياً من الشاشة الرئيسية؟");
                    if (deleteConfirm) {
                        if (patient.status && stats[patient.status] > 0) stats[patient.status]--;
                        delete patientDataMap[rowId];
                        updateStatsDOM();
                    } else {
                        return;
                    }
                }
                
                saveDataToStorage();
                rebuildCurrentVisitsTables();
            }, longPressDuration);
        }

        function handleLongPressEnd() {
            clearTimeout(longPressTimer);
        }

        function rebuildCurrentVisitsTables() {
            const upcomingBody = document.getElementById('upcomingVisitsBody');
            const lateBody = document.getElementById('lateVisitsBody');

            if(!upcomingBody || !lateBody) return;

            upcomingBody.innerHTML = `<tr id="noUpcomingRow"><td colspan="4" class="no-data">لا توجد زيارات قادمة اليوم</td></tr>`;
            lateBody.innerHTML = `<tr id="noLateRow"><td colspan="4" class="no-data">لا توجد زيارات متأخرة حالياً</td></tr>`;

            Object.keys(patientDataMap).forEach(rowId => {
                const patient = patientDataMap[rowId];
                const newStatus = patient.status;

                let badgeHTML = '';
                if (newStatus === 'waiting') badgeHTML = `<span class="status-badge badge-waiting">منتظر</span>`;
                if (newStatus === 'unconfirmed') badgeHTML = `<span class="status-badge badge-unconfirmed">غير مؤكد</span>`;
                if (newStatus === 'confirmed') badgeHTML = `<span class="status-badge badge-confirmed">مؤكد</span>`;
                if (newStatus === 'canceled') badgeHTML = `<span class="status-badge badge-canceled">تم إلغاؤه</span>`;
                if (newStatus === 'lost') badgeHTML = `<span class="status-badge badge-lost">فقد</span>`;

                let targetTbodyId = 'upcomingVisitsBody';
                let isLateTable = false;
                if (newStatus === 'lost' || newStatus === 'canceled') {
                    targetTbodyId = 'lateVisitsBody';
                    isLateTable = true;
                }

                const targetTbody = document.getElementById(targetTbodyId);
                const newRow = document.createElement('tr');
                newRow.setAttribute('id', rowId);

                const timeColor = isLateTable ? 'style="color: #b91c1c;"' : '';

                const longPressEvents = `
                    onmousedown="handleLongPressStart('${rowId}')" 
                    onmouseup="handleLongPressEnd()" 
                    onmouseleave="handleLongPressEnd()"
                    ontouchstart="handleLongPressStart('${rowId}')" 
                    ontouchend="handleLongPressEnd()"
                `;

                newRow.innerHTML = `
                    <td ${timeColor}>${patient.time}</td>
                    <td style="position: static;">
                        <div class="patient-name-click" onclick="toggleDropdown(event, '${rowId}')" ${longPressEvents}>${patient.name}</div>
                        <small style="color:#64748b; font-size:12px; display:block; margin-top:2px;">كود: ${patient.code} | ت: ${patient.phone}</small>
                        <div style="margin-top: 5px;">
                            ${badgeHTML}
                            <span class="note-badge">${patient.note}</span>
                        </div>

                        <div class="status-dropdown" id="drop_${rowId}">
                            <div onclick="changePatientStatus('${rowId}', 'waiting')">⏳ منتظر</div>
                            <div onclick="changePatientStatus('${rowId}', 'unconfirmed')">⚪ غير مؤكد</div>
                            <div onclick="changePatientStatus('${rowId}', 'confirmed')">🔵 مؤكد</div>
                            <div onclick="changePatientStatus('${rowId}', 'canceled')">❌ تم إلغاؤه</div>
                            <div onclick="changePatientStatus('${rowId}', 'lost')">⚠️ فقد</div>
                        </div>
                    </td>
                    <td>${patient.clinic || 'غير محدد'}</td>
                    <td>${patient.doctor || 'غير محدد'}</td>
                `;

                targetTbody.appendChild(newRow);
            });

            checkTableEmptyState('upcomingVisitsBody', 'noUpcomingRow');
            checkTableEmptyState('lateVisitsBody', 'noLateRow');
        }

        function pushToArchive(patient) {
            const uniqueKey = patient.code.trim();
            if (!archivePatientsMap[uniqueKey]) {
                archivePatientsMap[uniqueKey] = {
                    name: patient.name,
                    phone: patient.phone,
                    code: patient.code,
                    visits: {}
                };
            }
            archivePatientsMap[uniqueKey].visits[patient.id] = {
                date: patient.date,
                time: patient.time,
                clinic: patient.clinic,
                doctor: patient.doctor,
                note: patient.note,
                status: patient.status
            };
        }

        document.getElementById('labForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const pName = document.getElementById('labPatientName').value;
            const lName = document.getElementById('labName').value;
            const wType = document.getElementById('labWorkType').value;
            const doc = document.getElementById('labDoctor').value;
            const exitDateRaw = document.getElementById('labExitDate').value;
            const delDateRaw = document.getElementById('labDeliveryDate').value;

            const eDateObj = new Date(exitDateRaw);
            const formattedExitDate = `${String(eDateObj.getDate()).padStart(2, '0')}/${String(eDateObj.getMonth() + 1).padStart(2, '0')}/${eDateObj.getFullYear()}`;

            const dDateObj = new Date(delDateRaw);
            const formattedDelDate = `${String(dDateObj.getDate()).padStart(2, '0')}/${String(dDateObj.getMonth() + 1).padStart(2, '0')}/${dDateObj.getFullYear()}`;

            const labId = 'lab_' + Date.now();
            labDataList.push({
                id: labId,
                patientName: pName,
                labName: lName,
                workType: wType,
                doctor: doc,
                exitDate: formattedExitDate,
                deliveryDate: formattedDelDate,
                rawDeliveryDate: delDateRaw, 
                status: 'making'
            });

            saveDataToStorage();
            rebuildLabTable();
            document.getElementById('labForm').reset();
            alert('تم تسجيل طلب المعمل وتواريخ الإرسال والاستلام بنجاح!');
        });

        function changeLabStatus(labId, newStatus) {
            const item = labDataList.find(l => l.id === labId);
            if (item) {
                if (newStatus === 'delete') {
                    const conf = confirm("هل تريد حذف طلب المعمل هذا نهائياً؟");
                    if (conf) {
                        labDataList = labDataList.filter(l => l.id !== labId);
                    }
                } else {
                    item.status = newStatus;
                }
                saveDataToStorage();
                rebuildLabTable();
            }
        }

        function rebuildLabTable() {
            const tbody = document.getElementById('labTableBody');
            if (!tbody) return;
            tbody.innerHTML = `<tr id="noLabRow"><td colspan="6" class="no-data">لا توجد طلبات معمل مسجلة حالياً</td></tr>`;

            labDataList.forEach(item => {
                let badgeHTML = '';
                if (item.status === 'making') badgeHTML = `<span class="status-badge badge-lab-making">⏳ تحت التصنيع</span>`;
                if (item.status === 'ready') badgeHTML = `<span class="status-badge badge-lab-ready">🔵 جاهز بالمعمل</span>`;
                if (item.status === 'done') badgeHTML = `<span class="status-badge badge-lab-done">✅ تم الاستلام بالعيادة</span>`;

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${item.patientName}</strong></td>
                    <td>${item.labName}</td>
                    <td>${item.workType} <br><small style="color:#64748b;">د/ ${item.doctor}</small></td>
                    <td>${item.exitDate}</td>
                    <td style="color:#0d9488;"><strong>${item.deliveryDate}</strong></td>
                    <td style="position: relative;">
                        <div class="patient-name-click" onclick="toggleDropdown(event, '${item.id}')">${badgeHTML}</div>
                        <div class="lab-dropdown" id="labDrop_${item.id}">
                            <div onclick="changeLabStatus('${item.id}', 'making')">⏳ تحت التصنيع</div>
                            <div onclick="changeLabStatus('${item.id}', 'ready')">🔵 جاهز بالمعمل</div>
                            <div onclick="changeLabStatus('${item.id}', 'done')">✅ تم الاستلام</div>
                            <div onclick="changeLabStatus('${item.id}', 'delete')" style="color: #b91c1c;">🗑️ حذف الطلب</div>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
            checkTableEmptyState('labTableBody', 'noLabRow');
        }

        document.getElementById('financeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const type = document.getElementById('finType').value;
            const amount = parseFloat(document.getElementById('finAmount').value);
            const statement = document.getElementById('finStatement').value;

            const now = new Date();
            const timestamp = `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

            financeTransactions.push({
                id: 'fin_' + Date.now(),
                dateTime: timestamp,
                type: type,
                amount: amount,
                statement: statement
            });

            saveDataToStorage();
            rebuildFinanceDOM();
            document.getElementById('financeForm').reset();
            alert('تم تسجيل العملية المالية وتقييدها بالدفاتر بنجاح!');
        });

        function deleteFinanceTransaction(transId) {
            const conf = confirm("هل تريد حذف هذا القيد المالي نهائياً من الدفاتر؟");
            if (conf) {
                financeTransactions = financeTransactions.filter(t => t.id !== transId);
                saveDataToStorage();
                rebuildFinanceDOM();
            }
        }

        function rebuildFinanceDOM() {
            const tbody = document.getElementById('financeTableBody');
            if(!tbody) return;

            tbody.innerHTML = `<tr id="noFinanceRow"><td colspan="4" class="no-data">لم يتم تقييد عمليات مالية لليوم حتى الآن</td></tr>`;

            let totalIncome = 0;
            let totalExpenses = 0;

            financeTransactions.forEach(trans => {
                const row = document.createElement('tr');
                row.setAttribute('title', 'اضغط مرتين متتاليتين لحذف المعاملة');
                row.ondblclick = () => deleteFinanceTransaction(trans.id);
                
                let typeText = '';
                let amountStyle = '';

                if (trans.type === 'income') {
                    totalIncome += trans.amount;
                    typeText = '📈 إيرادات';
                    amountStyle = 'style="color: #10b981; font-weight: bold;"';
                } else {
                    totalExpenses += trans.amount;
                    typeText = '📉 مصروفات';
                    amountStyle = 'style="color: #ef4444; font-weight: bold;"';
                }

                row.innerHTML = `
                    <td>${trans.dateTime}</td>
                    <td>${typeText}</td>
                    <td>${trans.statement} <br><small style="color: #94a3b8; font-size: 11px;">(انقر مزدوجاً للحذف)</small></td>
                    <td ${amountStyle}>${trans.amount.toFixed(2)} EGP</td>
                `;
                tbody.appendChild(row);
            });

            const netProfit = totalIncome - totalExpenses;

            document.getElementById('total-income').innerText = `${totalIncome.toFixed(2)} EGP`;
            document.getElementById('total-expenses').innerText = `${totalExpenses.toFixed(2)} EGP`;
            document.getElementById('total-net').innerText = `${netProfit.toFixed(2)} EGP`;

            checkTableEmptyState('financeTableBody', 'noFinanceRow');
        }

        function renderHistoryDOM() {
            const tbody = document.getElementById('historyTableBody');
            if(!tbody) return;
            tbody.innerHTML = ''; 
            const keys = Object.keys(archivePatientsMap);

            if (keys.length === 0) {
                tbody.innerHTML = `<tr id="noHistoryRow"><td colspan="3" class="no-data">السجل فارغ حالياً</td></tr>`;
                return;
            }

            keys.forEach(key => {
                const p = archivePatientsMap[key];
                const visitIds = Object.keys(p.visits);
                const visitCount = visitIds.length;

                let subTableRowsHTML = '';
                visitIds.forEach(id => {
                    const v = p.visits[id];
                    let statusText = '';
                    if (v.status === 'waiting') statusText = '⏳ منتظر';
                    if (v.status === 'unconfirmed') statusText = '⚪ غير مؤكد';
                    if (v.status === 'confirmed') statusText = '🔵 مؤكد وبانتظار الإتمام';
                    if (v.status === 'canceled') statusText = '❌ تم إلغاؤه';
                    if (v.status === 'lost') statusText = '⚠️ فقد';

                    subTableRowsHTML += `
                        <tr>
                            <td>${v.date}</td>
                            <td>${v.time}</td>
                            <td>${v.clinic || 'غير مححدد'}</td>
                            <td>${v.doctor || 'غير محدد'}</td>
                            <td><strong style="color: #16a34a;">${v.note}</strong></td>
                            <td>${statusText}</td>
                        </tr>
                    `;
                });

                const row = document.createElement('tr');
                row.className = 'history-item-row';
                row.setAttribute('data-name', p.name.toLowerCase());
                row.setAttribute('data-phone', p.phone);
                row.setAttribute('data-code', p.code);

                row.innerHTML = `
                    <td>
                        <strong>${p.name}</strong>
                        <div style="font-size: 12px; color: #64748b; margin-top: 4px;">الكود: ${p.code}</div>
                        <div style="font-size: 12px; color: #64748b;">الهاتف: ${p.phone}</div>
                    </td>
                    <td style="text-align: center; font-size: 18px; color: #6366f1; font-weight: bold;">${visitCount}</td>
                    <td>
                        <div style="overflow-x: auto;">
                            <table class="history-sub-table">
                                <thead>
                                    <tr>
                                        <th>التاريخ</th>
                                        <th>الوقت</th>
                                        <th>العيادة</th>
                                        <th>الطبيب</th>
                                        <th>الملاحظات</th>
                                        <th>الحالة</th>
                                    </tr>
                                </thead>
                                <tbody>${subTableRowsHTML}</tbody>
                            </table>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function filterHistory() {
            const query = document.getElementById('historySearchInput').value.toLowerCase().trim();
            const rows = document.querySelectorAll('.history-item-row');
            let hasResults = false;

            rows.forEach(row => {
                const name = row.getAttribute('data-name');
                const phone = row.getAttribute('data-phone');
                const code = row.getAttribute('data-code');

                if (name.includes(query) || phone.includes(query) || code.includes(query)) {
                    row.style.display = 'table-row';
                    hasResults = true;
                } else {
                    row.style.display = 'none';
                }
            });

            const noRow = document.getElementById('noHistoryRow');
            if (!hasResults) {
                if (!noRow) {
                    const tbody = document.getElementById('historyTableBody');
                    const emptyRow = document.createElement('tr');
                    emptyRow.id = 'noHistoryRow';
                    emptyRow.innerHTML = `<td colspan="3" class="no-data">عذراً، لم يتم العثور على نتائج!</td>`;
                    tbody.appendChild(emptyRow);
                } else {
                    noRow.style.display = 'table-row';
                }
            } else {
                if (noRow) noRow.remove();
            }
        }

        function checkTableEmptyState(tbodyId, noDataRowId) {
            const tbody = document.getElementById(tbodyId);
            const placeholder = document.getElementById(noDataRowId);
            if (!tbody || !placeholder) return;
            let visibleRows = 0;
            for (let child of tbody.children) {
                if (child.id !== noDataRowId && child.style.display !== 'none') visibleRows++;
            }
            placeholder.style.display = (visibleRows === 0) ? 'table-row' : 'none';
        }

        function logoutSystem() {
            saveDataToStorage(); 
            localStorage.setItem('italian_clinic_logged_in', 'false'); 
            location.reload(); 
        }

        function formatTime12Hour(timeString) {
            if (!timeString) return '--:--';
            const [sHours, sMinutes] = timeString.split(':');
            let hours = parseInt(sHours);
            const minutes = sMinutes;
            const ampm = hours >= 12 ? 'م' : 'ص';
            hours = hours % 12 || 12;
            return `${String(hours).padStart(2, '0')}:${minutes} ${ampm}`;
        }

        document.getElementById('appointmentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('patientName').value;
            const phone = document.getElementById('patientPhone').value;
            const rawDate = document.getElementById('appointmentDate').value; 
            const rawTime = document.getElementById('appointmentTime').value; 
            const clinic = document.getElementById('appointmentClinic').value;
            const doctor = document.getElementById('appointmentDoctor').value;
            const code = document.getElementById('appointmentCode').value;
            const note = document.getElementById('appointmentNote').value || "حشو فحص عام"; 

            const dateObj = new Date(rawDate);
            const formattedDate = `${String(dateObj.getDate()).padStart(2, '0')}/${String(dateObj.getMonth() + 1).padStart(2, '0')}/${dateObj.getFullYear()}`;
            const timeStr = formatTime12Hour(rawTime);
            const rowId = 'row_' + Date.now();

            patientDataMap[rowId] = {
                id: rowId, name: name, phone: phone, date: formattedDate, code: code, note: note, time: timeStr, clinic: clinic, doctor: doctor, status: null
            };

            changePatientStatus(rowId, 'waiting');
            document.getElementById('appointmentForm').reset();
            alert('تم حجز الموعد بنجاح!');
            switchPage('home');
        });

        function updateClock() {
            const clockEl = document.getElementById('liveClock');
            if(!clockEl) return;
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'مساءً' : 'صباحاً';
            hours = hours % 12 || 12;
            clockEl.innerText = `${String(hours).padStart(2, '0')}:${minutes} ${ampm}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        const today = new Date();
        const dateEl = document.getElementById('currentDate');
        if(dateEl) dateEl.innerText = `${String(today.getDate()).padStart(2, '0')}/${String(today.getMonth() + 1).padStart(2, '0')}/${today.getFullYear()}`;

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;

            if (user === "Italian dental center" && pass === "Italian 712554") {
                localStorage.setItem('italian_clinic_logged_in', 'true'); 
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                if(video) video.pause();
                checkLabDeadlines(); 
            } else {
                alert("اسم المستخدم أو كلمة المرور غير صحيحة!");
            }
        });

        window.onload = loadSavedData;
    </script>
