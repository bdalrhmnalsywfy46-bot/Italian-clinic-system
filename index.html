<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيستم العيادة - تسجيل الدخول</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* خلفية الفيديو الكاملة */
        .video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* تعتيم فوق الفيديو عشان الفورم يبان */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            z-index: 2;
        }

        /* زرار تشغيل الصوت */
        .audio-control {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 4;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.3s;
        }

        .audio-control:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        /* أنيميشن دخول الكارت */
        @keyframes customEntrance {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* كارت تسجيل الدخول */
        .login-card {
            position: relative;
            z-index: 3;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
            color: #fff;
            animation: customEntrance 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .login-card h2 {
            margin-bottom: 25px;
            font-size: 26px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #cbd5e1;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.6);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            text-align: right;
        }

        .input-group input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #1d4ed8, #1e40af);
        }
    </style>
</head>
<body>

    <video class="video-bg" id="bgVideo" autoplay loop muted playsinline>
        <source src="./المركز الايطالي لتجميل وزراعة الأسنان_225155_20260613_....mp4" type="video/mp4">
        <source src="المركز الايطالي لتجميل وزراعة الأسنان_225155_20260613_....mp4" type="video/mp4">
        متصفحك لا يدعم تشغيل الفيديو.
    </video>
    
    <div class="overlay"></div>

    <button class="audio-control" onclick="toggleAudio()" id="audioBtn">
        <span>🔇 تشغيل الصوت</span>
    </button>

    <div class="login-card">
        <h2>تسجيل الدخول</h2>
        <form onsubmit="event.preventDefault(); alert('تم الدخول بنجاح!');">
            <div class="input-group">
                <label for="username">اسم المستخدم</label>
                <input type="text" id="username" required placeholder="أدخل اسم المستخدم">
            </div>
            <div class="input-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" required placeholder="أدخل كلمة المرور">
            </div>
            <button type="submit" class="login-btn">دخول</button>
        </form>
    </div>

    <script>
        function toggleAudio() {
            const video = document.getElementById('bgVideo');
            const audioBtn = document.getElementById('audioBtn');
            
            if (video.muted) {
                video.muted = false;
                audioBtn.innerHTML = '<span>🔊 كتم الصوت</span>';
            } else {
                video.muted = true;
                audioBtn.innerHTML = '<span>🔇 تشغيل الصوت</span>';
            }
        }

        window.addEventListener('DOMContentLoaded', (event) => {
            const video = document.getElementById('bgVideo');
            video.play().catch(err => console.log("التحميل التلقائي شغال"));
        });
    </script>
</body>
</html>
