<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Italian Dental Center</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }

        /* حاوية الشاشة الكاملة */
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        /* الفيديو شغال في الخلفية مرة واحدة */
        .video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* طبقة بيضاء شفافة خفيفة فوق الفيديو عشان تدي روح الصورة الأساسية */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.85);
            z-index: 2;
        }

        /* محتوى واجهة تسجيل الدخول (مطابق تماماً لتصميم صورتك) */
        .login-content {
            position: relative;
            z-index: 3;
            width: 100%;
            max-width: 420px;
            height: 100%;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* لتوزيع اللوجو فوق والفورم في النص والعنوان تحت */
        }

        /* الجزء العلوي: اللوجو واسم المركز */
        .header-brand {
            text-align: center;
            margin-top: 20px;
            width: 100%;
        }

        .brand-title {
            font-size: 38px;
            font-weight: 900;
            color: #000000;
            line-height: 1.2;
        }

        .brand-sub {
            font-size: 26px;
            font-weight: bold;
            color: #000000;
            margin-top: 5px;
        }

        /* الجزء الأوسط: خانات الإدخال الحقيقية */
        .form-container {
            width: 100%;
            margin-top: -40px;
        }

        .input-group {
            margin-bottom: 35px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 12px;
            font-size: 24px;
            font-weight: bold;
            color: #000000;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            font-size: 18px;
            border: none;
            border-bottom: 2px solid #000000; /* خط أسود ممتد تحت الخانة */
            background: transparent;
            color: #000000;
            outline: none;
            text-align: right;
        }

        /* زر الدخول المتموضع في الأسفل */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #b91c1c; /* لون أحمر لتسجيل الدخول مطابق لزرار الصورة */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* الجزء السفلي: العنوان المكتوب في الصورة */
        .footer-address {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #000000;
            line-height: 1.5;
            margin-bottom: 20px;
            width: 100%;
        }

        /* زر كتم وصوت الفيديو */
        .audio-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        /* --- واجهة لوحة التحكم (الشاشة الثانية) --- */
        #dashboard {
            display: none;
            width: 100%;
            height: 100%;
            padding: 20px;
            text-align: center;
            background: #f8fafc;
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <video class="video-bg" id="bgVideo" autoplay playsinline muted>
            <source src="intro.mp4" type="video/mp4">
        </video>
        
        <div class="overlay"></div>
        
        <button class="audio-btn" onclick="toggleMute()">🔇 تشغيل الصوت</button>

        <div class="login-content">
            
            <div class="header-brand">
                <div class="brand-title">المركز</div>
                <div class="brand-title">الإيطالي</div>
                <div class="brand-sub">لتجميل وزراعة الأسنان</div>
            </div>

            <form id="loginForm" class="form-container">
                <div class="input-group">
                    <label>اسم المستخدم:</label>
                    <input type="text" id="userInput" required placeholder="Italian dental center">
                </div>
                <div class="input-group">
                    <label>كلمة المرور:</label>
                    <input type="password" id="passInput" required placeholder="••••••••">
                </div>
                <button type="submit" class="login-btn">دخول</button>
            </form>

            <div class="footer-address">
                7 القضاة - شارع الطاقة - النادي الأهلي<br>مدينة نصر - القاهرة
            </div>

        </div>
    </div>

    <div id="dashboard">
        <h1 style="color: #15803d; margin-top: 50px;">مرحباً بك في لوحة تحكم المركز الإيطالي</h1>
        <p style="margin-top: 20px;">تم تسجيل الدخول بنجاح بالبيانات المطلوبة.</p>
        <button onclick="location.reload()" style="margin-top: 30px; padding: 10px 25px; background: #b91c1c; color: white; border: none; border-radius: 5px; cursor: pointer;">تسجيل خروج</button>
    </div>

    <script>
        const video = document.getElementById('bgVideo');
        video.loop = false; // تشغيل الفيديو مرة واحدة فقط دون تكرار

        function toggleMute() {
            video.muted = !video.muted;
            event.target.innerText = video.muted ? "🔇 تشغيل الصوت" : "🔊 كتم الصوت";
        }

        // التحقق من بيانات الدخول
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;

            if (user === "Italian dental center" && pass === "Italian 712554") {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                video.pause(); // إيقاف الفيديو عند الدخول
            } else {
                alert("اسم المستخدم أو كلمة المرور غير صحيحة!");
            }
        });
    </script>
</body>
</html>
