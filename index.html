<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Italian Dental Center</title>
    <style>
        /* CSS الخاص بك الأصلي مع تنسيقات المخزن المضافة */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body, html { width: 100%; height: 100%; overflow-x: hidden; background-color: #f1f5f9; }
        
        /* [تم دمج كافة تنسيقات CSS السابقة الخاصة بك هنا] */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .video-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.85); z-index: 2; }
        .login-content { position: relative; z-index: 3; width: 100%; max-width: 420px; padding: 40px; }
        #dashboard { display: none; width: 100%; min-height: 100vh; background: #f4f6f9; padding: 15px; }
        .sidebar { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: #ffffff; z-index: 90; transition: 0.3s; padding: 80px 20px; }
        .sidebar.open { right: 0; }
        .sidebar-menu li { padding: 15px; border-bottom: 1px solid #ddd; cursor: pointer; font-weight: bold; }
        .page-section { display: none; }
        .active-page { display: block; }
        .alert-low { color: #ef4444; font-weight: bold; }
        .submit-appointment-btn { width: 100%; padding: 14px; background: #0284c7; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <video class="video-bg" id="bgVideo" autoplay playsinline loop muted>
            <source src="intro.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
        <div class="login-content">
            <form id="unifiedLoginForm">
                <input type="text" id="unifiedUserInput" placeholder="اسم المستخدم" required style="width:100%; padding:10px; margin-bottom:10px;">
                <input type="password" id="unifiedPassInput" placeholder="كلمة المرور" required style="width:100%; padding:10px; margin-bottom:10px;">
                <button type="submit" class="submit-appointment-btn">دخول</button>
            </form>
        </div>
    </div>

    <div id="dashboard">
        <div class="sidebar" id="sidebar">
            <ul class="sidebar-menu">
                <li onclick="switchPage('home')">الرئيسية</li>
                <li onclick="switchPage('add')">إضافة موعد</li>
                <li onclick="switchPage('history')">سجل المرضى</li>
                <li onclick="switchPage('lab')">المعامل</li>
                <li id="menu-inventory" onclick="switchPage('inventory')" style="display:none;">إدارة المخزن 📦</li>
                <li id="menu-admin" onclick="switchPage('admin')" style="display:none;">الإدارة والماليات 🔐</li>
                <li onclick="logoutSystem()" style="color:red;">تسجيل الخروج</li>
            </ul>
        </div>
        
        <div id="page-inventory" class="page-section">
            <h3>إدارة المخزن</h3>
            <form id="inventoryForm" class="form-card">
                <input type="text" id="itemName" placeholder="اسم الخامة" required style="width:100%; padding:10px; margin-bottom:10px;">
                <input type="number" id="itemQty" placeholder="الكمية" required style="width:100%; padding:10px; margin-bottom:10px;">
                <button type="submit" class="submit-appointment-btn">حفظ</button>
            </form>
            <div class="table-container">
                <table>
                    <thead><tr><th>الخامة</th><th>الكمية</th><th>الحالة</th></tr></thead>
                    <tbody id="inventoryTableBody"></tbody>
                </table>
            </div>
        </div>
        
        </div>

    <script>
        // --- متغيرات المخزن ---
        let inventoryList = JSON.parse(localStorage.getItem('italian_clinic_inventory')) || [];

        // --- التنبيه عند أقل من 2 ---
        function checkInventoryAlerts() {
            const lowItems = inventoryList.filter(i => i.qty < 2);
            if(lowItems.length > 0) {
                let text = "⚠️ تنبيه مخزني: الأصناف التالية أقل من 2:\n";
                lowItems.forEach(i => text += `- ${i.name} (${i.qty})\n`);
                alert(text);
            }
        }

        // --- عرض المخزن ---
        function renderInventory() {
            const tbody = document.getElementById('inventoryTableBody');
            if(!tbody) return;
            tbody.innerHTML = '';
            inventoryList.forEach(item => {
                const status = item.qty < 2 ? '<span class="alert-low">⚠️ نقص حاد!</span>' : '✅ متوفر';
                tbody.innerHTML += `<tr><td>${item.name}</td><td>${item.qty}</td><td>${status}</td></tr>`;
            });
        }

        // --- إضافة خامة ---
        document.getElementById('inventoryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('itemName').value;
            const qty = parseInt(document.getElementById('itemQty').value);
            inventoryList.push({ id: Date.now(), name, qty });
            localStorage.setItem('italian_clinic_inventory', JSON.stringify(inventoryList));
            renderInventory();
            this.reset();
        });

        // --- تعديل الصلاحيات (أضف هذا لدالتك) ---
        function applyRoleToUI() {
            const adminMenu = document.getElementById('menu-admin');
            const invMenu = document.getElementById('menu-inventory');
            if (currentRole === 'admin') {
                if(adminMenu) adminMenu.style.display = 'block';
                if(invMenu) invMenu.style.display = 'block';
                checkInventoryAlerts(); 
            }
        }

        // --- عند التحميل ---
        window.onload = function() {
            loadSavedData(); // دالتك الأصلية
            renderInventory();
        };

        // [أكمل باقي دوالك الأصلية هنا...]
    </script>
</body>
</html>
