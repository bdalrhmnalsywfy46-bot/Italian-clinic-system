<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيستم العيادة - تسجيل الدخول</title>
    <style>
        /* إعادة تعيين الأنماط الأساسية */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a; /* خلفية داكنة مريحة للعين */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* الشاشة الأولى: زر الدخول والترحيب */
        .intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.8s ease;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0px 4px 20px rgba(37, 99, 235, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0px 6px 25px rgba(37, 99, 235, 0.6);
        }

        /* الشاشة الرئيسية للسيستم والفيديو */
        .main-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: none; /* مخفية في الأول */
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* خلفية الفيديو */
        .video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* طبقة ناعمة فوق الفيديو عشان تخلي الفورم واضح */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6); /* تعتيم خفيف */
            z-index: 2;
        }

        /* حركات الأنيميشن للفورم قبل ما يثبت */
        @keyframes customEntrance {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* كارت تسجيل الدخول */
        .login-card {
            position: relative;
            z-index: 3;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); /* تأثير زجاجي رايق */
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
            color: #fff;
            
            /* تفعيل الحركة البسيطة قبل الثبات */
            animation: customEntrance 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .login-card h2 {
            margin-bottom: 25px;
            font-size: 26px;
            letter-spacing: 1px;
        }

        /* الخانات (Inputs) */
        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #cbd5e1;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.5);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            text-align: right;
        }

        .input-group input:focus {
            border-color: #38bdf8;
        }

        /* زر تسجيل الدخول */
        .login-btn {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: #2563eb;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

    <!-- الشاشة الأولى: زر بدء السيستم وتفعيل الصوت -->
    <div class="intro-screen" id="introScreen">
        <button class="start-btn" onclick="startSystem()">دخول السيستم</button>
    </div>

    <!-- الشاشة الرئيسية: الفيديو وفورم التسجيل -->
    <div class="main-container" id="mainContainer">
        <!-- الفيديو الجاهز يعمل تلقائياً بالصوت بعد الضغط على الزر -->
        <video class="video-bg" id="bgVideo" loop>
            <source src="intro.mp4" type="video/mp4">
            متصفحك لا يدعم تشغيل الفيديو.
        </video>
        
        <!-- الطبقة الناعمة فوق الفيديو -->
        <div class="overlay"></div>

        <!-- كارت تسجيل الدخول المتحرك -->
        <div class="login-card">
            <h2>تسجيل الدخول</h2>
            <form onsubmit="event.preventDefault(); alert('تم الضغط على دخول! جاهز للخطوة الجاية؟');">
                <div class="input-group">
                    <label for="username">اسم المستخدم</label>
                    <input type="text" id="username" required placeholder="أدخل اسم المستخدم">
                </div>
                <div class="input-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" required placeholder="أدخل كلمة المرور">
                </div>
                <button type="submit" class="login-btn">دخول</button>
            </form>
        </div>
    </div>

    <script>
        function startSystem() {
            const introScreen = document.getElementById('introScreen');
            const mainContainer = document.getElementById('mainContainer');
            const video = document.getElementById('bgVideo');

            // 1. إخفاء شاشة البداية بنعومة
            introScreen.style.opacity = '0';
            
            setTimeout(() => {
                introScreen.style.display = 'none';
                
                // 2. إظهار السيستم والفيديو
                mainContainer.style.display = 'flex';
                setTimeout(() => {
                    mainContainer.style.opacity = '1';
                }, 50);

                // 3. تشغيل الفيديو بالصوت عل طول
                video.play().catch(error => {
                    console.log("حدث خطأ أثناء تشغيل الفيديو: ", error);
                });

            }, 800); // الانتظار لحد ما تختفي شاشة البداية
        }
    </script>
</body>
</html>
