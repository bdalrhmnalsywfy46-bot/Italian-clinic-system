<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - سيستم العيادة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* خلفية هادية ومريحة للعين تناسب العيادات */
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 30px 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        /* تنسيق اللوجو في المنتصف فوق الحقول */
        .clinic-logo-container {
            margin-bottom: 25px;
        }

        .clinic-logo-container img {
            max-width: 140px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .login-card h2 {
            color: #2e3e52;
            font-size: 22px;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: #627d98;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9fb3c8;
            font-size: 16px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 45px 12px 15px; /* مساحة أكبر من اليمين للأيقونة */
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
            color: #334e68;
            background-color: #f8fafc;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            border-color: #3b82f6;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* زر الدخول المربوط بصفحة الـ Dashboard */
        .login-btn {
            width: 100%;
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
            display: block;
            text-decoration: none; /* عشان لو استعملناه كـ رابط للتنقل */
        }

        .login-btn:hover {
            background-color: #2563eb;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 12px;
            color: #9fb3c8;
        }
    </style>
</head>
<body>

    <div class="login-card">
        
        <div class="clinic-logo-container">
            <img src="logo.png" alt="Smile Show Logo" onerror="this.src='https://via.placeholder.com/140x60?text=SMILE+SHOW'">
        </div>

        <h2>تسجيل الدخول إلى السيستم</h2>

        <form action="dashboard.html" method="GET">
            
            <div class="input-group">
                <label>اسم المستخدم</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" placeholder="أدخل اسم المستخدم" required>
                </div>
            </div>

            <div class="input-group">
                <label>كلمة المرور</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="أدخل كلمة المرور" required>
                </div>
            </div>

            <button type="submit" class="login-btn">دخول</button>

        </form>

        <div class="footer-text">
            نظام إدارة العيادة الذكي © 2026
        </div>

    </div>

</body>
</html>
