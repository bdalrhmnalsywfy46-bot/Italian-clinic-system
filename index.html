<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المركز الإيطالي لتجميل وزراعة الأسنان</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --primary-color: #800020; /* عنابي */
            --admin-color: #dc3545; /* أحمر */
            --secretary-color: #007bff; /* أزرق */
            --bg-color: #f4f6f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* شاشة تسجيل الدخول */
        .login-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn-login {
            background-color: var(--primary-color);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
        }

        /* لوحة التحكم Dashboard */
        .dashboard-container {
            display: none;
            background: white;
            width: 95%;
            max-width: 1100px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            margin: 20px auto;
        }

        .header-dash {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .user-badge {
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
            color: white;
            font-size: 14px;
        }
        .role-admin { background-color: var(--admin-color); }
        .role-secretary { background-color: var(--secretary-color); }

        /* واجهة إدارة العيادة (شغل السكرتير والأدمن) */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .main-content { grid-template-columns: 1fr; }
        }

        .form-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e3e6f0;
        }

        .form-box h3 { margin-top: 0; color: #333; }

        .form-box input, .form-box select {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn-save {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        /* جدول المواعيد */
        .table-box {
            background: white;
            border: 1px solid #e3e6f0;
            border-radius: 8px;
            padding: 15px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }

        table th, table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        table th { background-color: #f1f1f1; color: #333; }

        .admin-box {
            background: #fff3f3;
            border: 1px solid #f5c6cb;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="loginScreen" class="login-container">
        <h1 style="color: var(--primary-color); margin-bottom:5px;">المركز الإيطالي</h1>
        <h2 style="font-size:18px; color:#555; margin-bottom:25px;">لتجميل وزراعة الأسنان</h2>
        
        <div class="input-group">
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
        </div>
        <div class="input-group">
            <input type="password" id="loginPassword" placeholder="كلمة المرور">
        </div>
        
        <button class="btn-login" onclick="handleLogin()">دخول للسيستم</button>

        <p style="font-size:12px; color:#777; margin-top:20px;">
            7 القضاة - شارع الطاقة - النادي الأهلي - مدينة نصر - القاهرة
        </p>
    </div>

    <div id="dashboardScreen" class="dashboard-container">
        <div class="header-dash">
            <h2>لوحة إدارة العيادة والمواعيد الرئيسي</h2>
            <div>
                <span id="userBadge" class="user-badge"></span>
                <button onclick="handleLogout()" style="margin-right:10px; padding:5px 12px; cursor:pointer; background:#555; color:white; border:none; border-radius:4px;">خروج</button>
            </div>
        </div>

        <div class="main-content">
            <div class="form-box">
                <h3>🗓️ تسجيل حجز جديد</h3>
                <input type="text" id="patientName" placeholder="اسم المريض بالكامل">
                <input type="tel" id="patientPhone" placeholder="رقم الهاتف">
                <input type="text" id="patientCase" placeholder="حالة الكشف (زراعة، تجميل، حشو...)">
                <input type="datetime-local" id="appointmentTime">
                <button class="btn-save" onclick="saveAppointment()">حفظ الحجز في المساحة 💾</button>
                
                <div id="adminOnlySection" style="display: none;" class="admin-box">
                    <h4 style="margin-top:0; color: var(--admin-color);">🔐 إدارة تفعيل الحسابات الجديدة</h4>
                    <input type="text" id="roleUid" placeholder="الـ UID للحساب الجديد">
                    <input type="text" id="roleName" placeholder="اسم الموظف">
                    <select id="roleSelect">
                        <option value="reception">سكرتارية / استقبال (🔵)</option>
                        <option value="admin">مدير / أدمن (🔴)</option>
                    </select>
                    <button onclick="saveUserRole()" style="background: var(--admin-color); color:white; border:none; padding:8px; width:100%; border-radius:5px; cursor:pointer; font-weight:bold;">تفعيل الحساب فوراً</button>
                </div>
            </div>

            <div class="table-box">
                <h3>📂 المواعيد المسجلة بالعيادة</h3>
                <table>
                    <thead>
                        <tr>
                            <th>اسم المريض</th>
                            <th>رقم الهاتف</th>
                            <th>الحالة والتشخيص</th>
                            <th>الموعد</th>
                            <th>بواسطة</th>
                        </tr>
                    </thead>
                    <tbody id="appointmentsTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 🚨 حط هنا الـ Config الخاصة بمشروع الفايربيز بتاعك
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        let currentUserUid = "";
        let currentUserRole = "";
        let cachedUserName = "";

        // 🔐 تسجيل الدخول
        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value.trim();

            if(!email || !pass) { alert("يرجى ملء البيانات!"); return; }

            auth.signInWithEmailAndPassword(email, pass)
            .then((userCredential) => { checkUserRoleAndEnter(userCredential.user); })
            .catch((error) => { alert("خطأ بالدخول: " + error.message); });
        }

        // 🛡️ فحص صلاحية الدخول والإشعار الفوري لأول مرة
        function checkUserRoleAndEnter(user) {
            currentUserUid = user.uid;
            database.ref('userRoles').child(user.uid).once('value').then((snapshot) => {
                const data = snapshot.val();

                if (data && data.role) {
                    currentUserRole = data.role;
                    cachedUserName = data.name || user.email;
                    
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('dashboardScreen').style.display = 'block';
                    
                    applyRoleUI(cachedUserName);
                    loadAppointments(); // تحميل المواعيد من المساحة التخزينية

                    if(currentUserRole === 'admin') { listenToActivationRequests(); }
                } else {
                    // 🚨 أول مرة يدخل -> يرسل إشعار فوري للأدمن في قاعدة البيانات
                    database.ref('activationRequests').child(user.uid).set({
                        uid: user.uid,
                        email: user.email,
                        requestTime: new Date().toLocaleString('ar-EG'),
                        status: 'pending'
                    }).then(() => {
                        alert('⏳ هذا أول تسجيل دخول لك. تم إرسال إشعار وطلب تفعيل فوري للدكتور (الأدمن)، برجاء انتظاره لتفعيل حسابك.');
                        auth.signOut();
                    });
                }
            });
        }

        function applyRoleUI(name) {
            const badge = document.getElementById('userBadge');
            const adminSection = document.getElementById('adminOnlySection');
            if (currentUserRole === "admin") {
                badge.innerText = "🔴 دكتور (Admin): " + name;
                badge.className = "user-badge role-admin";
                adminSection.style.display = "block";
            } else {
                badge.innerText = "🔵 سكرتارية: " + name;
                badge.className = "user-badge role-secretary";
                adminSection.style.display = "none";
            }
        }

        // 📢 مراقبة طلبات التفعيل للأدمن لايف
        function listenToActivationRequests() {
            database.ref('activationRequests').on('child_added', (snapshot) => {
                const request = snapshot.val();
                if (request && request.status === 'pending') {
                    const approve = confirm(`🚨 إشعار جديد: موظف جديد يحاول الدخول لأول مرة!\nالبريد: ${request.email}\nهل تريد تعبئة بياناته لتفعيله الآن؟`);
                    if (approve) {
                        document.getElementById('roleUid').value = request.uid;
                        document.getElementById('roleName').value = "موظف جديد";
                        database.ref('activationRequests').child(request.uid).update({ status: 'reviewed' });
                    }
                }
            });
        }

        // 💾 حفظ الصلاحية للحساب الجديد (خاص بالأدمن)
        function saveUserRole() {
            const uid = document.getElementById('roleUid').value.trim();
            const name = document.getElementById('roleName').value.trim();
            const role = document.getElementById('roleSelect').value;
            if(!uid || !name) { alert("أدخل البيانات كاملة!"); return; }

            database.ref('userRoles').child(uid).set({ name: name, role: role }).then(() => {
                alert("✅ تم التفعيل بنجاح! يمكنه الدخول الآن.");
                document.getElementById('roleUid').value = "";
                document.getElementById('roleName').value = "";
            });
        }

        // 💾 حفظ حجز المرضى في مساحة الفايربيز (شغل العيادة)
        function saveAppointment() {
            const name = document.getElementById('patientName').value.trim();
            const phone = document.getElementById('patientPhone').value.trim();
            const caseText = document.getElementById('patientCase').value.trim();
            const time = document.getElementById('appointmentTime').value;

            if(!name || !phone || !time) { alert("يرجى ملء بيانات الحجز الأساسية!"); return; }

            database.ref('appointments').push({
                patientName: name,
                patientPhone: phone,
                patientCase: caseText,
                appointmentTime: time,
                createdBy: cachedUserName
            }).then(() => {
                alert("✅ تم حفظ الحجز في مساحة العيادة بنجاح!");
                document.getElementById('patientName').value = "";
                document.getElementById('patientPhone').value = "";
                document.getElementById('patientCase').value = "";
                document.getElementById('appointmentTime').value = "";
            });
        }

        // 📂 جلب وعرض المواعيد تلقائياً لايف
        function loadAppointments() {
            database.ref('appointments').on('value', (snapshot) => {
                const tbody = document.getElementById('appointmentsTableBody');
                tbody.innerHTML = "";
                snapshot.forEach((childSnapshot) => {
                    const apt = childSnapshot.val();
                    const row = `<tr>
                        <td>${apt.patientName}</td>
                        <td>${apt.patientPhone}</td>
                        <td>${apt.patientCase || 'عام'}</td>
                        <td>${apt.appointmentTime.replace('T', ' ')}</td>
                        <td>${apt.createdBy}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            });
        }

        // 🚪 خروج
        function handleLogout() {
            auth.signOut().then(() => { location.reload(); });
        }
    </script>
</body>
</html>
