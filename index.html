<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المركز الإيطالي لتجميل وزراعة الأسنان</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; overflow: hidden; }
        
        /* الخلفية زي ما كانت بالظبط */
        .video-background {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            object-fit: cover;
        }

        /* واجهة الدخول بدون مربع أبيض (مباشرة على الفيديو) */
        .login-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        .input-field { 
            width: 300px; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid rgba(255,255,255,0.3); 
            border-radius: 8px; 
            background: rgba(255,255,255,0.8); 
            text-align: right; 
        }
        
        .btn-submit { 
            width: 300px; 
            padding: 12px; 
            background-color: #7a0014; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
        }

        .footer-text { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-background">
        <source src="intro.mp4" type="video/mp4">
    </video>

    <div class="login-wrapper">
        <h1>المركز الإيطالي</h1>
        <p>لتجميل وزراعة الأسنان</p>
        <input type="email" id="email" class="input-field" placeholder="البريد الإلكتروني">
        <input type="password" id="password" class="input-field" placeholder="كلمة المرور">
        <button class="btn-submit" onclick="login()">دخول</button>
        <div class="footer-text">7 القضاة - شارع الطاقة - النادي الأهلي<br>مدينة نصر - القاهرة</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            firebase.auth().signInWithEmailAndPassword(email, password)
            .then(() => { window.location.href = "dashboard.html"; })
            .catch((error) => { alert("خطأ في البيانات: " + error.message); });
        }
    </script>
</body>
</html>
